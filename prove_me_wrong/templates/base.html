<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prove Me Wrong{% endblock %}</title>
  {% block extra_head %}{% endblock %}
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e3e2df;
      --agree: #1f7a4d;
      --agree-bg: #e6f4ec;
      --disagree: #b3391f;
      --disagree-bg: #fbeae6;
      --accent: #1a1a1a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: inherit; }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }
    header.site {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    header.site .brand {
      font-weight: 700;
      font-size: 1.15rem;
      text-decoration: none;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .claim-text {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 0 0 16px;
    }
    .bar {
      display: flex;
      height: 14px;
      border-radius: 7px;
      overflow: hidden;
      background: var(--border);
      margin-bottom: 8px;
    }
    .bar .agree { background: var(--agree); }
    .bar .disagree { background: var(--disagree); }
    .split-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .split-labels .agree-label { color: var(--agree); font-weight: 600; }
    .split-labels .disagree-label { color: var(--disagree); font-weight: 600; }
    .vote-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    button, .btn {
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 10px 16px;
      background: var(--card);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }
    button.agree, .btn.agree { border-color: var(--agree); color: var(--agree); }
    button.agree.active, button.agree:hover { background: var(--agree-bg); }
    button.disagree, .btn.disagree { border-color: var(--disagree); color: var(--disagree); }
    button.disagree.active, button.disagree:hover { background: var(--disagree-bg); }
    .your-vote { font-size: 0.85rem; color: var(--muted); margin: 4px 0 0; }
    textarea, input[type=text] {
      width: 100%;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      resize: vertical;
    }
    .response-form .side-choice {
      display: flex;
      gap: 16px;
      margin: 8px 0;
      font-size: 0.9rem;
    }
    .response-list { margin-top: 8px; }
    .response {
      padding: 10px 0;
      border-top: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .response:first-child { border-top: none; }
    .response .side-tag {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-right: 6px;
    }
    .response .side-tag.agree { color: var(--agree); }
    .response .side-tag.disagree { color: var(--disagree); }
    .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 520px) { .columns { grid-template-columns: 1fr; } }
    h2.section-title { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 24px 0 8px; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .claim-list-item { text-decoration: none; display: block; }
    .claim-list-item .claim-text { font-size: 1.05rem; margin-bottom: 8px; }
    footer.site { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <a class="brand" href="{{ url_for('main.index') }}">Prove Me Wrong</a>
    </header>
    {% block content %}{% endblock %}
    <footer class="site">Prove Me Wrong &mdash; structured disagreement.</footer>
  </div>
</body>
</html>
