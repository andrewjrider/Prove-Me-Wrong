{% extends "base.html" %}
{% block title %}New claim — Prove Me Wrong{% endblock %}
{% block content %}
  <h2 class="section-title">Add a claim</h2>
  <div class="card">
    <form method="post" action="{{ url_for('main.admin_create_claim') }}">
      <input type="hidden" name="token" value="{{ token }}">
      <textarea name="text" rows="3" placeholder="One-sentence claim..." required></textarea>
      <p><button type="submit">Create claim</button></p>
    </form>
  </div>

  <h2 class="section-title">Moderation</h2>
  <div class="card">
    <p style="margin: 0;">
      <a href="{{ url_for('main.admin_moderation', token=token) }}">
        Review pending submissions
        {% if pending_count %}<span class="pending-badge">{{ pending_count }}</span>{% endif %}
      </a>
    </p>
  </div>
{% endblock %}
